name: Generate llms.txt

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'source/**'

  push:
    branches:
      - main
    paths:
      - 'source/**'

jobs:
  generate-llms:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
           # For pull_request_target, default checkout is the base branch (main).
           # Explicitly check out the PR head so we parse the PR's source changes.
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Incremental when llms.txt already exists; full scan otherwise.
      # PR:   diff against the base branch SHA.
      # Push: diff against the previous commit (before this push).
      - name: Extract API endpoints
        run: |
          BASE_REF=""
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE_REF="${{ github.event.before }}"
          fi

          if [ -n "$BASE_REF" ] && [ -f source/llms.txt ]; then
            python scripts/extract_apis.py --base-ref "$BASE_REF"
          else
            python scripts/extract_apis.py
          fi

      # -----------------------------------------------------------------------
      # On pull_request: post (or update) a single delta comment on the PR
      # -----------------------------------------------------------------------
      - name: Post delta comment on PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('source/llms.txt', 'utf8');

            // Extract the most recent entry from ## Recent Changes
            const changesIdx = content.indexOf('## Recent Changes');
            let delta = 'No changes detected.';
            if (changesIdx !== -1) {
              const section = content.slice(changesIdx + '## Recent Changes'.length).trimStart();
              const lines = section.split('\n');
              const entry = [];
              let started = false;
              for (const line of lines) {
                if (line.startsWith('### ')) {
                  if (started) break;   // second entry — stop
                  started = true;
                }
                if (started) entry.push(line);
              }
              if (entry.length) delta = entry.join('\n').trim();
            }

            const marker = '<!-- llms-delta-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n## API Endpoint Changes\n\n\`\`\`\n${delta}\n\`\`\``;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # -----------------------------------------------------------------------
      # On push to main: commit the updated llms.txt back
      # -----------------------------------------------------------------------
      - name: Commit updated llms.txt
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/llms.txt
          git diff --cached --quiet || git commit -m "chore: update llms.txt [skip ci]"
          git push
